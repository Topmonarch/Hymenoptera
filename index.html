<!DOCTYPE html>
<html>
<head>
  <title>Hymenoptera AI</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #222;
      background: #111;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .assistant {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #333;
    }

    #inputArea {
      display: flex;
      padding: 15px;
      border-top: 1px solid #222;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <header>Hymenoptera AI</header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="userInput" placeholder="Send a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    let conversation = [];

    const chat = document.getElementById("chat");

    function addMessage(content, role) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.innerText = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");

      conversation.push({
        role: "user",
        content: message
      });

      input.value = "";

      addMessage("Thinking...", "assistant");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await res.json();

      conversation.push({
        role: "assistant",
        content: data.reply
      });

      chat.lastChild.remove(); // remove "Thinking..."
      addMessage(data.reply, "assistant");
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
