<!DOCTYPE html>
<html>
<head>

<title>Hymenoptera</title>

<style>

body{
background:#0b0f14;
color:white;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:15px;
border-bottom:1px solid #222;
}

.logo{
height:40px;
}

#chat-screen{
display:none;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
}

.message{
margin:10px 0;
}

.user{
color:#4fc3f7;
}

.bot{
color:#90ee90;
}

#input-area{
display:flex;
border-top:1px solid #333;
}

#message-input{
flex:1;
padding:12px;
background:#111;
color:white;
border:none;
}

button{
padding:12px;
background:#1976d2;
border:none;
color:white;
cursor:pointer;
}

#login-screen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#111;
padding:30px;
border-radius:10px;
width:300px;
}

</style>

</head>

<body>

<header>
<img src="hymenoptera_logo_transparent.png" class="logo">
<h2>HYMENOPTERA</h2>
</header>


<div id="login-screen">

<div class="login-box">

<h3>Sign In</h3>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signIn()">Sign In</button>

<br><br>

<button onclick="continueAsGuest()">Continue as Guest</button>

</div>

</div>


<div id="chat-screen">

<div id="messages"></div>

<div id="input-area">

<input id="message-input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>

</div>

</div>


<script src="auth.js"></script>

<script>

async function sendMessage(){

const input = document.getElementById("message-input");

const message = input.value;

if(!message) return;

addMessage("user",message);

input.value="";

const response = await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({message})

});

const data = await response.json();

addMessage("bot",data.reply);

}

function addMessage(type,text){

const container = document.getElementById("messages");

const div = document.createElement("div");

div.className = "message "+type;

div.innerText = text;

container.appendChild(div);

container.scrollTop = container.scrollHeight;

}

</script>

</body>
</html>
