<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HYMENOPTERA</title>

<style>
/* Basic reset and theme */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
body { display:flex; height:100vh; background:radial-gradient(circle at top,#0c0c0c,#000000); color:white; }

/* === LAYOUT === */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
  border-right: 1px solid #1a1a1a;
  display:flex;
  flex-direction:column;
  padding:15px;
  gap:12px;
}
.new-chat {
  background: #2D8CFF; border: none; padding: 12px; border-radius: 8px; font-weight: bold; color: black; cursor: pointer;
}
.main { flex: 1; display:flex; flex-direction:column; }

/* Header */
.header {
  position: relative;
  display:flex;
  align-items:center;
  justify-content:flex-end; /* keep user area on the right */
  padding:16px 20px; border-bottom:1px solid #111;
  min-height:72px;
}

/* Centered brand (logo above the title) */
.center-brand {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display:flex;
  flex-direction: column;
  align-items: center;
  gap:8px;
  text-align:center;
}
.center-brand img.logo-img {
  max-height: 60px;
  width: auto;
  object-fit:contain;
  background: none;
  padding: 0;
  border: none;
  box-shadow: none;
  border-radius: 0;
}
.center-brand .title {
  font-size:18px;
  font-weight:800;
  color:#2D8CFF;
  letter-spacing:2px;
  text-transform:uppercase;
  text-shadow: 0 0 12px rgba(45,140,255,0.12);
}

/* User area (right) */
.user-area { display:flex; align-items:center; gap:10px; color:#ddd; z-index:2; }
.user-email { font-size:14px; color:#a7f; }
.btn { background:#222; color:#ddd; border:1px solid #333; padding:8px 10px; border-radius:6px; cursor:pointer; }
.btn.primary { background:#2D8CFF; color:black; border:none; }

/* Chat area */
#chat { flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column; gap:15px; }
.message { max-width:65%; padding:14px 18px; border-radius:14px; line-height:1.5; }
.user { align-self:flex-end; background:#2D8CFF; color:black; }
.assistant { align-self:flex-start; background:#111; border:1px solid #1a1a1a; color:white; }

/* Input area */
.input-area { padding:20px; border-top:1px solid #111; display:flex; gap:10px; }
.input-area input[type="text"] { flex:1; padding:10px; border-radius:8px; border:1px solid #222; background:#0b0b0b; color:#fff; }
.send-btn { padding:10px 14px; border-radius:8px; border:none; background:#2D8CFF; color:black; cursor:pointer; }

/* === AUTH MODAL / PANEL === */
.auth-panel {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.8));
  z-index:50;
  padding:20px;
}
.auth-card {
  width:420px; background:#0b0b0b; border-radius:10px; padding:20px; border:1px solid #222;
  box-shadow: 0 6px 30px rgba(0,0,0,0.6);
}
.auth-card h2 { color:#2D8CFF; margin-bottom:12px; text-align:center; }
.form-group { margin-bottom:12px; display:flex; flex-direction:column; gap:6px; }
.form-group label { font-size:13px; color:#bbb; }
.form-group input { padding:10px; border-radius:6px; border:1px solid #222; background:#0b0b0b; color:#fff; }
.form-actions { display:flex; gap:8px; margin-top:8px; justify-content:space-between; align-items:center; }
.form-toggle { font-size:13px; color:#9aa; cursor:pointer; text-decoration:underline; }

.guest-note { font-size:13px; color:#9aa; margin-top:8px; text-align:center; }

/* "Continue as Guest" button style */
.guest-btn { width:100%; margin-top:10px; padding:10px; border-radius:8px; border:1px dashed #444; background:transparent; color:#ddd; cursor:pointer; }

/* small helpers */
.hidden { display:none; }

/* Small responsiveness */
@media (max-width:800px) {
  .sidebar { display:none; }
  .auth-card { width:92%; }
  .center-brand img.logo-img { max-height: 40px; }
}
</style>
</head>
<body>
  <!-- Sidebar (kept minimal; removed chat history list and localStorage-based items) -->
  <div class="sidebar">
    <img src="/hymenoptera_logo_transparent.png" alt="Hymenoptera logo" style="height:44px;width:auto;" />
    <div style="font-weight:800;color:#2D8CFF;letter-spacing:2px;">Hymenoptera</div>
    <button id="newChatBtn" class="new-chat">New Chat</button>
    <!-- Chat list removed as requested -->
    <div style="color:#777;font-size:13px;margin-top:10px;">
      Chats are stored server-side (or in session) — chat history list removed from the UI.
    </div>
  </div>

  <!-- Main area -->
  <div class="main">
    <div class="header">
      <!-- Centered logo above the title -->
      <div class="center-brand" aria-hidden="false">
        <img src="/hymenoptera_logo_transparent.png" alt="Hymenoptera logo" class="logo-img" />
        <div class="title">HYMENOPTERA</div>
      </div>

      <!-- User area aligned to the right -->
      <div class="user-area" id="userArea">
        <div id="displayEmail" class="user-email hidden"></div>
        <button id="settingsBtn" class="btn hidden">Settings</button>
        <button id="logoutBtn" class="btn hidden">Logout</button>
      </div>
    </div>

    <!-- Chat messages container -->
    <div id="chat" aria-live="polite"></div>

    <!-- Input area -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask something..." />
      <button id="sendBtn" class="send-btn">Send</button>
    </div>
  </div>

  <!-- AUTH PANEL (shows before chat when not logged in) -->
  <div id="authPanel" class="auth-panel hidden" role="dialog" aria-modal="true">
    <div class="auth-card">
      <!-- Sign In form -->
      <div id="signInBox">
        <h2>Sign In</h2>
        <form id="signInForm">
          <div class="form-group">
            <label for="signinEmail">Email</label>
            <input id="signinEmail" type="email" required />
          </div>
          <div class="form-group">
            <label for="signinPassword">Password</label>
            <input id="signinPassword" type="password" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary">Sign In</button>
            <div class="form-toggle" id="showSignup">Create an account →</div>
          </div>

          <!-- Continue as Guest -->
          <button type="button" id="continueGuestBtn" class="guest-btn">Continue as Guest</button>
          <div class="guest-note">Guest sessions are temporary and chat history will not be saved.</div>

          <div id="signinError" style="color:#ff8b8b;margin-top:8px;"></div>
        </form>
      </div>

      <!-- Sign Up form -->
      <div id="signUpBox" class="hidden">
        <h2>Create Account</h2>
        <form id="signUpForm">
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input id="signupPassword" type="password" required />
          </div>
          <div class="form-group">
            <label for="signupConfirm">Confirm Password</label>
            <input id="signupConfirm" type="password" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary">Sign Up</button>
            <div class="form-toggle" id="showSignin">Have an account? Sign in →</div>
          </div>
          <div id="signupError" style="color:#ff8b8b;margin-top:8px;"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts: auth first so chat.js can check session/capabilities -->
  <script src="auth.js"></script>
  <script src="chat.js"></script>
</body>
</html>
