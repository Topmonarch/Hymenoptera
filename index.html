<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hymenoptera</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
 display:flex;
 height:100vh;
 background:radial-gradient(circle at top,#0c0c0c,#000000);
 color:white;
 font-family:Arial, Helvetica, sans-serif;
  h1 {
  color: #2F80ED;
  text-shadow:
    0 0 10px #2F80ED,
    0 0 20px #2F80ED,
    0 0 40px #2F80ED;
}
}

/* ===== SIDEBAR ===== */

.sidebar {
  width: 260px;
  background: #0b0b0b;
  border-right: 1px solid #1a1a1a;
  display: flex;
  flex-direction: column;
  padding: 15px;
  background: linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
}

.new-chat {
  background: #2D8CFF;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  color: black;
  cursor: pointer;
  margin-bottom: 20px;
}

.chat-history {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  color: #aaa;
}

.chat-item:hover {
  background: #111;
  color: white;
}

/* ===== MAIN AREA ===== */

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Header */

.header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #111;
}

.logo {
  height: 60px;
  margin-bottom: 10px;
}

.brand {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #2D8CFF;
  text-shadow: 0 0 12px rgba(45, 140, 255, 0.6);
}

/* Chat Messages */

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.message {
  max-width: 65%;
  padding: 14px 18px;
  border-radius: 14px;
  line-height: 1.5;
  animation: fadeIn 0.25s ease-out;
  function addMessage(text, role) {

  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = role;

  msg.innerText = text;

  chat.appendChild(msg);

  scrollChat();
}
  
  @keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
    
.user {
  align-self: flex-end;
  background: #2D8CFF;
  color: black;
}

.assistant {
  align-self:flex-start;
  background:#111;
  border:1px solid #1a1a1a;
  color:white;
}

/* Input Area */

.input-area {
  padding: 20px;
  border-top: 1px solid #111;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #2D8CFF;
  background: #0f0f0f;
  color: white;
  outline: none;
  font-size: 16px;
}

input::placeholder {
  color: #666;
}

button {
 background:#2D8CFF;
 border:none;
 padding:12px 24px;
 border-radius:8px;
 color:white;
 cursor:pointer;
 box-shadow:0 0 10px rgba(45,140,255,0.6);
 transition:0.2s;
 font-weight: bold;
}

button:hover {
 box-shadow:0 0 18px rgba(45,140,255,0.9);
 transform:scale(1.05);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

</style>
</head>

<body>

<div class="sidebar">
  <button class="new-chat">+ New Chat</button>
  <div class="chat-history">
    <div class="chat-item">Chat 1</div>
    <div class="chat-item">Chat 2</div>
  </div>
</div>

<div class="main">

  <div class="header">
    <img src="logo-icon.png" class="logo" alt="Logo">
    <div class="brand">HYMENOPTERA</div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Send a message...">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

</div>
  
<script>

  let chats = [];
  let currentChat = [];

  function scrollChat() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

let conversation = [];

const chat = document.getElementById("chat");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function addMessage(content, role) {
  const div = document.createElement("div");
  div.classList.add("message", role);
  div.innerText = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typeMessage(text) {
  const div = document.createElement("div");
  div.classList.add("message", "assistant");
  chat.appendChild(div);

  let i = 0;

  function typing() {
    if (i < text.length) {
      div.textContent += text.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }

  typing();
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const message = input.value.trim();

  if (!message) return;

  // Disable button while sending
  sendBtn.disabled = true;
  input.disabled = true;

  addMessage(message, "user");

  conversation.push({
    role: "user",
    content: message
  });

  input.value = "";

  addMessage("Thinking...", "assistant");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: conversation
      })
    });

    const data = await res.json();

    if (!res.ok) {
      chat.lastChild.remove();
      addMessage(`Error: ${data.error || data.reply || "Failed to get response"}`, "assistant");
      return;
    }

    chat.lastChild.remove();

    const reply = data.reply || "No response received";

    conversation.push({
      role: "assistant",
      content: reply
    });

    typeMessage(reply);

  } catch (error) {
    console.error("Error:", error);
    chat.lastChild.remove();
    addMessage(`Error: ${error.message}`, "assistant");
  } finally {
    // Re-enable button
    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
    currentChat.push({
  role: "user",
  content: message
});

conversation = currentChat;
  }
}

</script>

</body>
</html>
