<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>HYMENOPTERA</title>

  <!-- Tech Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000000;
      color: white;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      text-align: center;
      padding: 70px 20px 40px 20px;
      border-bottom: 1px solid #111;
    }

    .logo {
      height: 110px;
      margin-bottom: 25px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .brand {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #338FD5; /* Exact logo blue */
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 50px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 65%;
      padding: 16px 20px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 14px;
      word-wrap: break-word;
      letter-spacing: 1px;
    }

    .user {
      align-self: flex-end;
      background: #338FD5;
      color: white;
    }

    .assistant {
      align-self: flex-start;
      background: #111;
      border: 1px solid #1a1a1a;
    }

    #inputArea {
      display: flex;
      padding: 25px;
      border-top: 1px solid #111;
      background: #000;
    }

    input {
      flex: 1;
      padding: 16px;
      background: #111;
      border: 1px solid #1a1a1a;
      color: white;
      border-radius: 16px;
      outline: none;
      font-size: 14px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    input::placeholder {
      color: #444;
    }

    button {
      margin-left: 16px;
      padding: 16px 30px;
      background: #338FD5;
      border: none;
      color: white;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      transition: 0.2s ease;
    }

    button:hover {
      background: #2c7fc0;
    }

  </style>
</head>

<body>

  <header>
    <img src="logo-icon.png" class="logo" />
    <div class="brand">HYMENOPTERA</div>
  </header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="userInput" placeholder="SEND A MESSAGE..." />
    <button onclick="sendMessage()">SEND</button>
  </div>

  <script>
    let conversation = [];
    const chat = document.getElementById("chat");

    function addMessage(content, role) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.innerText = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");

      conversation.push({
        role: "user",
        content: message
      });

      input.value = "";

      addMessage("PROCESSING...", "assistant");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await res.json();

      conversation.push({
        role: "assistant",
        content: data.reply
      });

      chat.lastChild.remove();
      addMessage(data.reply, "assistant");
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
