<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hymenoptera</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
 display:flex;
 height:100vh;
 background:radial-gradient(circle at top,#0c0c0c,#000000);
 color:white;
 font-family:Arial, Helvetica, sans-serif;
}

/* ===== SIDEBAR ===== */

.sidebar {
  width: 260px;
  background: #0b0b0b;
  border-right: 1px solid #1a1a1a;
  display: flex;
  flex-direction: column;
  padding: 15px;
  background: linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
}

.new-chat {
  background: #2D8CFF;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  color: black;
  cursor: pointer;
  margin-bottom: 20px;
}

.chat-history {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  color: #aaa;
}

.chat-item:hover {
  background: #111;
  color: white;
}

/* ===== MAIN AREA ===== */

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Header */

.header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #111;
}

.logo {
  height: 60px;
  margin-bottom: 10px;
}

.brand {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #2D8CFF;
  text-shadow: 0 0 12px rgba(45, 140, 255, 0.6);
}

/* Chat Messages */

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.message {
  max-width: 65%;
  padding: 14px 18px;
  border-radius: 14px;
  line-height: 1.5;
  animation: fadeIn 0.25s ease-out;
}
  
  @keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
    
.user {
  align-self: flex-end;
  background: #2D8CFF;
  color: black;
}

.assistant {
  align-self:flex-start;
  background:#111;
  border:1px solid #1a1a1a;
  color:white;
}

/* Input Area */

.input-area {
  padding: 20px;
  border-top: 1px solid #111;
  display: flex;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #2D8CFF;
  background: #0f0f0f;
  color: white;
  outline: none;
}

button {
 background:#2D8CFF;
 border:none;
 padding:12px 18px;
 border-radius:10px;
 color:white;
 cursor:pointer;
 box-shadow:0 0 10px rgba(45,140,255,0.6);
 transition:0.2s;
}

button:hover {
 box-shadow:0 0 18px rgba(45,140,255,0.9);
 transform:scale(1.05);
}


button:hover {
  opacity: 0.9;
}

</style>
</head>

<body>

<div class="sidebar">
  <button class="new-chat">+ New Chat</button>
  <div class="chat-history">
    <div class="chat-item">Chat 1</div>
    <div class="chat-item">Chat 2</div>
  </div>
</div>

<div class="main">

  <div class="header">
    <img src="logo-icon.png" class="logo">
    <div class="brand">HYMENOPTERA</div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Send a message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>

let conversation = [];

const chat = document.getElementById("chat");

function addMessage(content, role) {
  const div = document.createElement("div");
  div.classList.add("message", role);
  div.innerText = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const div = document.createElement("div");
  div.classList.add("message","assistant");
  chat.appendChild(div);

  let i = 0;

  function typing() {
    if (i < text.length) {
      div.textContent += text.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }

  typing();
}
  const input = document.getElementById("userInput");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");

  conversation.push({
    role: "user",
    content: message
  });

  input.value = "";

  addMessage("Thinking...", "assistant");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: conversation })
  });

  const data = await res.json();

  chat.lastChild.remove();

  conversation.push({
    role: "assistant",
    content: data.reply
  });

  typeMessage(data.reply);
}

document.getElementById("userInput")
.addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});

 <script>

document.addEventListener("DOMContentLoaded", function () {

  const chat = document.getElementById("chat");
  const input = document.getElementById("userInput");

  let conversation = [];

  function addMessage(content, role) {
    const div = document.createElement("div");
    div.classList.add("message", role);
    div.innerText = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function typeMessage(text) {
    const div = document.createElement("div");
    div.classList.add("message", "assistant");
    chat.appendChild(div);

    let i = 0;

    function typing() {
      if (i < text.length) {
        div.textContent += text.charAt(i);
        i++;
        setTimeout(typing, 20);
      }
    }

    typing();
  }

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

  async function sendMessage() {

    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");

    conversation.push({
      role: "user",
      content: message
    });

    input.value = "";

    addMessage("Thinking...", "assistant");

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await res.json();

    chat.lastChild.remove();

    conversation.push({
      role: "assistant",
      content: data.reply
    });

    typeMessage(data.reply);
  }

});

</script>

</body>
</html>
