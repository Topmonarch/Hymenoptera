<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Hymenoptera</title>

  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      text-align: center;
      padding: 50px 20px 25px 20px;
      border-bottom: 1px solid #161b22;
    }

    .logo {
      height: 95px;
      margin-bottom: 18px;
    }

    .brand {
      font-size: 34px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #00eaff;
      text-shadow:
        0 0 6px #00eaff,
        0 0 14px #00eaff,
        0 0 28px #0099ff;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 65%;
      padding: 14px 18px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .assistant {
      align-self: flex-start;
      background: #11161c;
      border: 1px solid #1e2630;
    }

    #inputArea {
      display: flex;
      padding: 20px;
      border-top: 1px solid #161b22;
      background: #0f141a;
    }

    input {
      flex: 1;
      padding: 14px;
      background: #141a21;
      border: 1px solid #1e2630;
      color: white;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    input::placeholder {
      color: #6b7280;
    }

    button {
      margin-left: 12px;
      padding: 14px 22px;
      background: #00eaff;
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: #00c8ff;
    }

  </style>
</head>

<body>

  <header>
    <img src="logo-icon.png" class="logo" />
    <div class="brand">Hymenoptera</div>
  </header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="userInput" placeholder="Send a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    let conversation = [];
    const chat = document.getElementById("chat");

    function addMessage(content, role) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.innerText = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");

      conversation.push({
        role: "user",
        content: message
      });

      input.value = "";

      addMessage("Thinking...", "assistant");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await res.json();

      conversation.push({
        role: "assistant",
        content: data.reply
      });

      chat.lastChild.remove();
      addMessage(data.reply, "assistant");
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
