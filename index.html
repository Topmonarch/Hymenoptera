<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>HYMENOPTERA</title>

  <!-- Premium Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000000;
      background: linear-gradient(to bottom, #000000, #0a0a0a);
      color: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px 20px;
      border-bottom: 1px solid #111;
    }

    .logo {
      height: 90px;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      background: transparent;
      height: 80px;
      margin-bottom: 10px;
   }

.brand {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #2F80ED
  margin-bottom: 25px;
}
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: linear-gradient(to bottom, #000000 0%, #050505 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 65%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 15px;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease forwards;
      opacity: 0;
    }

    .user {
      align-self: flex-end;
      background: #338FD5;
      color: white;
    }

    .assistant {
      align-self: flex-start;
      background: #111;
      border: 1px solid #1a1a1a;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    #inputArea {
      display: flex;
      padding: 20px;
      border-top: 1px solid #111;
      background: #000;
    }

    input {
      flex: 1;
      padding: 16px;
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      border: 1px solid #338FD5; 
      box-shadow: 0 0 8px rgba(51, 143, 213, 0.5);
      color: white;
      border-radius: 18px;
      outline: none;
      font-size: 15px;
      transition: 0.2s ease;
    }

    input::placeholder {
      color: #444;
    }

    input:focus {
      border-color: #338FD5;
      box-shadow: 0 0 0 2px rgba(51, 143, 213, 0.2);
    }

    button {
      margin-left: 14px;
      padding: 14px 28px;
      background: #338FD5;
      border: none;
      color: white;
      border-radius: 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: #2c7fc0;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0px);
    }
  </style>
</head>

<body>

  <header>
    <img src="logo-icon.png" class="logo" />
    <div class="brand">HYMENOPTERA</div>
  </header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="userInput" placeholder="Send a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    let conversation = [];
    const chat = document.getElementById("chat");

    function addMessage(content, role) {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.innerText = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");

      conversation.push({
        role: "user",
        content: message
      });

      input.value = "";

      addMessage("Thinking...", "assistant");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await res.json();

      conversation.push({
        role: "assistant",
        content: data.reply
      });

      chat.lastChild.remove();
      addMessage(data.reply, "assistant");
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
