<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hymenoptera</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    body { margin:0; background:#060606; color:#ddd; font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    .main { max-width:1100px; margin:24px auto; padding:0 16px; }
    .header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .center-brand { display:flex; align-items:center; gap:12px; }
    .logo-img { width:56px; height:56px; display:block; }
    .title { font-weight:800; color:#2D8CFF; letter-spacing:2px; font-size:18px; }
    #chat { height:420px; background:#0b0b0b; border:1px solid #111; border-radius:8px; padding:18px; overflow:auto; margin-top:16px; display:flex; flex-direction:column; gap:12px; }
    .input-area { padding:12px; border-top:1px solid #111; display:flex; gap:10px; margin-top:12px; align-items:center; }
    .input-area input[type="text"] { flex:1; padding:10px; border-radius:8px; border:1px solid #222; background:#0b0b0b; color:#fff; }
    .send-btn { padding:10px 14px; border-radius:8px; border:none; background:#2D8CFF; color:black; cursor:pointer; }
    .hidden { display:none; }
    .auth-panel {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.8));
      z-index:50;
      padding:20px;
    }
    .auth-card { width:420px; background:#0b0b0b; border-radius:10px; padding:20px; border:1px solid #222; color:#ddd; }
    /* Ensure auth panel does not block pointer events when hidden (defensive) */
    .hidden.auth-panel { display:none; pointer-events:none; }
  </style>
</head>
<body>
  <div class="main">
    <div class="header">
      <div class="center-brand" aria-hidden="false">
        <!-- Inline SVG logo so logo always appears without external file -->
        <svg class="logo-img" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hymenoptera logo">
          <defs>
            <linearGradient id="lg" x1="0" x2="1"><stop offset="0" stop-color="#2D8CFF"/><stop offset="1" stop-color="#8A2BE2"/></linearGradient>
          </defs>
          <rect width="64" height="64" rx="10" fill="url(#lg)"/>
          <g transform="translate(12,12)" fill="#fff" opacity="0.95">
            <path d="M20 0C26 0 30 4 30 10s-4 10-10 10S10 16 10 10 14 0 20 0z"/>
            <circle cx="20" cy="32" r="6"/>
          </g>
        </svg>
        <div>
          <div class="title">HYMENOPTERA</div>
          <div style="font-size:12px;color:#aaa;">AI assistant</div>
        </div>
      </div>

      <div class="user-area" id="userArea">
        <div id="displayEmail" class="user-email hidden"></div>
        <button id="settingsBtn" class="btn hidden">Settings</button>
        <button id="logoutBtn" class="btn hidden">Logout</button>
      </div>
    </div>

    <div id="chat" aria-live="polite"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask something..." />
      <!-- Ensure button is type=button so it won't try to submit forms -->
      <button id="sendBtn" type="button" class="send-btn">Send</button>
    </div>
  </div>

  <!-- AUTH PANEL (shows before chat when not logged in) -->
  <div id="authPanel" class="auth-panel hidden" role="dialog" aria-modal="true">
    <div class="auth-card">
      <div id="signInBox">
        <h2>Sign In</h2>
        <form id="signInForm">
          <div class="form-group">
            <label for="signinEmail">Email</label>
            <input id="signinEmail" type="email" required />
          </div>
          <div class="form-group">
            <label for="signinPassword">Password</label>
            <input id="signinPassword" type="password" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary">Sign In</button>
          </div>

          <div style="margin-top:12px;">
            <button type="button" id="continueGuestBtn" class="guest-btn">Continue as Guest</button>
            <div id="signinError" style="color:#ff8b8b;margin-top:8px;"></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts: auth first so chat.js can check session/capabilities -->
  <script src="auth.js"></script>
  <script src="auth-debug.js"></script>
  <script src="chat.js"></script>
</body>
</html>
