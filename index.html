<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hymenoptera</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
 display:flex;
 height:100vh;
 background:radial-gradient(circle at top,#0c0c0c,#000000);
 color:white;
 font-family:Arial, Helvetica, sans-serif;
}

h1 {
  color: #2F80ED;
  text-shadow:
    0 0 10px #2F80ED,
    0 0 20px #2F80ED,
    0 0 40px #2F80ED;
}

/* ===== SIDEBAR ===== */

.sidebar {
  width: 260px;
  background: #0b0b0b;
  border-right: 1px solid #1a1a1a;
  display: flex;
  flex-direction: column;
  padding: 15px;
  background: linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
}

.new-chat {
  background: #2D8CFF;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  color: black;
  cursor: pointer;
  margin-bottom: 20px;
}

.chat-history {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  color: #aaa;
}

.chat-item:hover {
  background: #111;
  color: white;
}

/* ===== MAIN AREA ===== */

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Header */

.header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #111;
}

.logo {
  height: 60px;
  margin-bottom: 10px;
}

.brand {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #2D8CFF;
  text-shadow: 0 0 12px rgba(45, 140, 255, 0.6);
}

/* Chat Messages */

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.message {
  max-width: 65%;
  padding: 14px 18px;
  border-radius: 14px;
  line-height: 1.5;
  animation: fadeIn 0.25s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
    
.user {
  align-self: flex-end;
  background: #2D8CFF;
  color: black;
}

.assistant {
  align-self:flex-start;
  background:#111;
  border:1px solid #1a1a1a;
  color:white;
}

/* Input Area */

.input-area {
  padding: 20px;
  border-top: 1px solid #111;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #2D8CFF;
  background: #0f0f0f;
  color: white;
  outline: none;
  font-size: 16px;
}

input::placeholder {
  color: #666;
}

button {
 background:#2D8CFF;
 border:none;
 padding:12px 24px;
 border-radius:8px;
 color:white;
 cursor:pointer;
 box-shadow:0 0 10px rgba(45,140,255,0.6);
 transition:0.2s;
 font-weight: bold;
}

button:hover {
 box-shadow:0 0 18px rgba(45,140,255,0.9);
 transform:scale(1.05);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

</style>
</head>

<body>

<div class="sidebar">
  <button class="new-chat">+ New Chat</button>
  <div class="chat-history">
    <div class="chat-item">Chat 1</div>
    <div class="chat-item">Chat 2</div>
  </div>
</div>

<div class="main">

  <div class="header">
    <img src="logo-icon.png" class="logo" alt="Logo">
    <div class="brand">HYMENOPTERA</div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Send a message...">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

</div>
  
<script>

let chats = JSON.parse(localStorage.getItem("hymenoptera_chats")) || {};
let currentChat = "chat1";

function saveChats() {
  localStorage.setItem("hymenoptera_chats", JSON.stringify(chats));
}

function loadChat(name) {

  currentChat = name;

  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";

  if (!chats[name]) chats[name] = [];

  chats[name].forEach(m => {
    addMessage(m.content, m.role, false);
  });

}

function addMessage(text, role, save = true) {

  const chatBox = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = role;

  msg.innerText = text;

  chatBox.appendChild(msg);

  chatBox.scrollTop = chatBox.scrollHeight;

  if (save) {
    chats[currentChat].push({
      role: role,
      content: text
    });

    saveChats();
  }

}

async function sendMessage() {

  const input = document.getElementById("userInput");

  const message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");

  input.value = "";

  addMessage("Thinking...", "assistant", false);

  const res = await fetch("/api/chat", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      messages: chats[currentChat]
    })

  });

  const data = await res.json();

  const chatBox = document.getElementById("chat");

  chatBox.lastChild.remove();

  addMessage(data.reply, "assistant");

}

document.getElementById("userInput")
.addEventListener("keydown", function(e) {

  if (e.key === "Enter") {
    sendMessage();
  }

});

window.onload = () => {

  if (!chats["chat1"]) chats["chat1"] = [];

  loadChat("chat1");

};

</script>

</body>
</html>
